# Integration Test Workflow
# Runs integration tests by calling tests.sh script
#
# Inputs:
#   crate_name: Component crate name (auto-detected from Cargo.toml if empty)
#   test_targets: Test targets to run (comma-separated or "all")

name: Test

on:
  workflow_call:
    inputs:
      crate_name:
        description: 'Component crate name (auto-detected from Cargo.toml if empty)'
        required: false
        default: ''
        type: string

jobs:
  # 检测测试目标列表
  detect-targets:
    name: Detect Targets
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      targets: ${{ steps.detect.outputs.targets }}
      has-targets: ${{ steps.detect.outputs.has-targets }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout component
        uses: actions/checkout@v5

      - name: Clone test framework
        run: |
          git clone --depth 1 --branch ndev https://github.com/arceos-hypervisor/axci.git axci
          chmod +x axci/tests.sh

      - name: Detect test targets
        id: detect
        run: |
          # 获取测试目标列表
          TARGETS=$(./axci/tests.sh --list-auto)
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          
          # 生成 matrix 配置，包含 target 和对应的 runner
          MATRIX="["
          first=true
          
          # 解析每个目标并分配对应的 runner
          for target in $(echo "$TARGETS" | jq -r '.[]'); do
            if [ "$first" = true ]; then
              first=false
            else
              MATRIX+=","
            fi
            
          # 根据目标类型确定 runner (self-hosted runner 需要数组格式)
            if [[ "$target" == *"board-phytiumpi"* ]]; then
              runner='["self-hosted", "phytiumpi"]'
              board='"phytiumpi"'
            elif [[ "$target" == *"board-roc-rk3568-pc"* ]]; then
              runner='["self-hosted", "roc-rk3568-pc"]'
              board='"roc-rk3568-pc"'
            else
              # QEMU 测试和其他测试使用 self-hosted
              runner='"self-hosted"'
              board='null'
            fi
            
            MATRIX+="{\"target\":\"$target\",\"runner\":$runner,\"board\":$board}"
          done
          MATRIX+="]"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix: $MATRIX"
          
          if [ "$TARGETS" = "[]" ]; then
            echo "has-targets=false" >> $GITHUB_OUTPUT
          else
            echo "has-targets=true" >> $GITHUB_OUTPUT
          fi
          echo "Detected targets: $TARGETS"

  # 单元测试
  unit-test:
    name: Unit Test
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout component
        uses: actions/checkout@v5

      - name: Clone test framework
        run: |
          git clone --depth 1 https://github.com/arceos-hypervisor/axci.git axci
          chmod +x axci/tests.sh

      - name: Run unit tests
        run: |
          ./axci/tests.sh unit

  # 集成测试 (matrix 并行)
  integration-test:
    name: Integration Test ${{ matrix.target }}
    needs: detect-targets
    if: needs.detect-targets.outputs.has-targets == 'true'
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-targets.outputs.matrix) }}
    steps:
      - name: Checkout component
        uses: actions/checkout@v5

      - name: Clone test framework
        run: |
          git clone --depth 1 https://github.com/arceos-hypervisor/axci.git axci
          chmod +x axci/tests.sh

      - name: Run test for ${{ matrix.target }}
        run: |
          ./axci/tests.sh integration -s ${{ matrix.target }} --fs --print -v

  # 无测试目标时的提示
  no-tests:
    name: No Tests Available
    needs: detect-targets
    if: needs.detect-targets.outputs.has-targets == 'false'
    runs-on: self-hosted
    steps:
      - name: No tests to run
        run: |
          echo "No test targets detected for this component."
          echo "Check rust-toolchain.toml or component configuration."
