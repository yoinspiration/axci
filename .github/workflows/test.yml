# Integration Test Workflow
# Runs integration tests by patching component into test targets
#
# Default test targets: axvisor, starry
# Inputs:
#   crate_name: Component crate name (required, auto-detected if empty)
#   test_targets: Test targets to run (comma-separated or "all")
#
# Workflow:
# 1. Checkout component (the caller repo)
# 2. Checkout test target (axvisor/starry)
# 3. Patch target's Cargo.toml to use component
# 4. Run tests in target directory

name: Test

on:
  workflow_call:
    inputs:
      crate_name:
        description: 'Component crate name (auto-detected from Cargo.toml if empty)'
        required: false
        default: ''
        type: string
      test_targets:
        description: 'Test targets (comma-separated or "all")'
        required: false
        default: 'all'
        type: string
      base_ref:
        description: 'Base ref for auto target detection'
        required: false
        default: 'origin/main'
        type: string

jobs:
  detect:
    name: "Detect test matrix"
    runs-on: ubuntu-latest
    outputs:
      axvisor_matrix: ${{ steps.matrix.outputs.axvisor_matrix }}
      starry_matrix: ${{ steps.matrix.outputs.starry_matrix }}
      skip_all: ${{ steps.matrix.outputs.skip_all }}
      selection_mode: ${{ steps.matrix.outputs.selection_mode }}
      requested_targets: ${{ steps.matrix.outputs.requested_targets }}
      axvisor_count: ${{ steps.matrix.outputs.axvisor_count }}
      starry_count: ${{ steps.matrix.outputs.starry_count }}
    steps:
      - name: Harden git network settings
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 104857600

      - name: Checkout component repository
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          fetch-depth: 0
          path: component

      - name: Resolve axci workflow ref
        id: axci_ref
        run: |
          REF_PART="${{ github.workflow_ref }}"
          REF_PART="${REF_PART##*@}"
          echo "ref=$REF_PART" >> "$GITHUB_OUTPUT"

      - name: Checkout axci rules
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          repository: arceos-hypervisor/axci
          ref: ${{ steps.axci_ref.outputs.ref }}
          path: axci-rules

      - name: Build dynamic matrix from test_targets input
        id: matrix
        working-directory: component
        run: |
          INPUT="${{ inputs.test_targets }}"
          BASE_REF="${{ inputs.base_ref }}"
          RULES_FILE="../axci-rules/configs/test-target-rules.json"
          TARGETS_JSON="[]"
          AUTO_REASON="manual_input"

          parse_targets_input() {
            printf '%s' "$1" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))'
          }

          is_non_code_file() {
            local path="$1"
            jq -e --arg path "$path" '
              (.non_code.dirs  | any(. as $d | $path | startswith($d))) or
              (.non_code.exts  | any(. as $e | $path | endswith($e))) or
              (.non_code.files | any(. as $f | $path == $f))
            ' "$RULES_FILE" > /dev/null 2>&1
          }

          if [ "$INPUT" = "auto" ] || [ "$INPUT" = "__auto__" ]; then
            if [ ! -f "$RULES_FILE" ]; then
              echo "Rules file not found at $RULES_FILE, fallback to all"
              TARGETS_JSON='["all"]'
              AUTO_REASON="rules_missing_fallback_all"
            else
              if ! jq -e '
                .non_code and
                .run_all_patterns and
                .selection_rules and
                .target_order
              ' "$RULES_FILE" > /dev/null 2>&1; then
                echo "Rules file is invalid, fallback to all"
                TARGETS_JSON='["all"]'
                AUTO_REASON="rules_invalid_fallback_all"
              else
                CHANGED_FILES="$(git diff --name-only "$BASE_REF" 2>/dev/null || true)"
                if [ -z "$CHANGED_FILES" ]; then
                  echo "base_ref '$BASE_REF' unavailable or no diff, fallback to HEAD~1"
                  CHANGED_FILES="$(git diff --name-only HEAD~1 2>/dev/null || true)"
                fi

                if [ -z "$CHANGED_FILES" ]; then
                  TARGETS_JSON='[]'
                  AUTO_REASON="no_changes_skip"
                else
                  mapfile -t RUN_ALL_PATTERNS < <(jq -r '.run_all_patterns[]' "$RULES_FILE")
                  mapfile -t RULE_ROWS < <(jq -r '.selection_rules[] | [.id, (.patterns | join("\u001f")), (.targets | join("\u001f"))] | @tsv' "$RULES_FILE")
                  mapfile -t TARGET_ORDER < <(jq -r '.target_order[]' "$RULES_FILE")

                  HAS_CODE_CHANGE=false
                  NEEDS_ALL=false
                  declare -A SELECTED=()

                  while IFS= read -r f; do
                    [ -z "$f" ] && continue

                    if ! is_non_code_file "$f"; then
                      HAS_CODE_CHANGE=true
                    fi

                    for p in "${RUN_ALL_PATTERNS[@]}"; do
                      if [[ "$f" == $p ]]; then
                        NEEDS_ALL=true
                        break
                      fi
                    done

                    for row in "${RULE_ROWS[@]}"; do
                      IFS=$'\t' read -r _rule_id patterns_blob targets_blob <<< "$row"
                      matched=false
                      IFS=$'\x1f' read -r -a patterns <<< "$patterns_blob"
                      for p in "${patterns[@]}"; do
                        if [[ "$f" == $p ]]; then
                          matched=true
                          break
                        fi
                      done
                      if [ "$matched" = true ]; then
                        IFS=$'\x1f' read -r -a targets <<< "$targets_blob"
                        for t in "${targets[@]}"; do
                          SELECTED["$t"]=1
                        done
                      fi
                    done
                  done <<< "$CHANGED_FILES"

                  if [ "$HAS_CODE_CHANGE" = false ]; then
                    TARGETS_JSON='[]'
                    AUTO_REASON="non_code_only_skip"
                  elif [ "$NEEDS_ALL" = true ]; then
                    TARGETS_JSON='["all"]'
                    AUTO_REASON="run_all_rule"
                  else
                    ORDERED_TARGETS=()
                    for t in "${TARGET_ORDER[@]}"; do
                      if [ -n "${SELECTED[$t]:-}" ]; then
                        ORDERED_TARGETS+=("$t")
                      fi
                    done

                    if [ ${#ORDERED_TARGETS[@]} -eq 0 ]; then
                      TARGETS_JSON='["all"]'
                      AUTO_REASON="no_match_fallback_all"
                    else
                      TARGETS_JSON=$(printf '%s\n' "${ORDERED_TARGETS[@]}" | jq -Rsc 'split("\n") | map(select(length > 0))')
                      AUTO_REASON="rule_selected"
                    fi
                  fi
                fi
              fi
            fi
          else
            TARGETS_JSON=$(parse_targets_input "$INPUT")
          fi

          AXVISOR_ALL='[
            {"type":"qemu","arch":"aarch64","vmconfigs":"configs/vms/arceos-aarch64-qemu-smp1.toml","vmconfigs_name":"ArceOS","vmimage_name":"qemu_aarch64_arceos","target_key":"axvisor-qemu-aarch64-arceos"},
            {"type":"qemu","arch":"aarch64","vmconfigs":"configs/vms/linux-aarch64-qemu-smp1.toml","vmconfigs_name":"Linux","vmimage_name":"qemu_aarch64_linux","target_key":"axvisor-qemu-aarch64-linux"},
            {"type":"qemu","arch":"x86_64","vmconfigs":"configs/vms/nimbos-x86_64-qemu-smp1.toml","vmconfigs_name":"NimbOS","vmimage_name":"qemu_x86_64_nimbos","target_key":"axvisor-qemu-x86_64-nimbos"},
            {"type":"board","board":"phytiumpi","vmconfigs":"configs/vms/arceos-aarch64-e2000-smp1.toml","vmconfigs_name":"ArceOS","target_key":"axvisor-board-phytiumpi-arceos"},
            {"type":"board","board":"phytiumpi","vmconfigs":"configs/vms/linux-aarch64-e2000-smp1.toml","vmconfigs_name":"Linux","target_key":"axvisor-board-phytiumpi-linux"},
            {"type":"board","board":"roc-rk3568-pc","vmconfigs":"configs/vms/arceos-aarch64-rk3568-smp1.toml","vmconfigs_name":"ArceOS","target_key":"axvisor-board-roc-rk3568-pc-arceos"},
            {"type":"board","board":"roc-rk3568-pc","vmconfigs":"configs/vms/linux-aarch64-rk3568-smp1.toml","vmconfigs_name":"Linux","target_key":"axvisor-board-roc-rk3568-pc-linux"}
          ]'

          STARRY_ALL='[
            {"arch":"riscv64","target_key":"starry-riscv64"},
            {"arch":"loongarch64","target_key":"starry-loongarch64"},
            {"arch":"aarch64","target_key":"starry-aarch64"},
            {"arch":"x86_64","target_key":"starry-x86_64"}
          ]'

          AXVISOR_MATRIX=$(echo "$AXVISOR_ALL" | jq -c --argjson targets "$TARGETS_JSON" '
            if (($targets | length) == 0) or (($targets | index("all")) != null) or (($targets | index("axvisor")) != null)
            then map(del(.target_key))
            else map(select(. as $item | ($targets | index($item.target_key)) != null)) | map(del(.target_key))
            end
          ')

          STARRY_MATRIX=$(echo "$STARRY_ALL" | jq -c --argjson targets "$TARGETS_JSON" '
            if (($targets | length) == 0) or (($targets | index("all")) != null) or (($targets | index("starry")) != null)
            then map(del(.target_key))
            else map(select(. as $item | ($targets | index($item.target_key)) != null)) | map(del(.target_key))
            end
          ')

          SKIP_ALL=false
          if [ "$AXVISOR_MATRIX" = "[]" ] && [ "$STARRY_MATRIX" = "[]" ]; then
            SKIP_ALL=true
          fi

          SELECTION_MODE="subset"
          if [ "$INPUT" = "auto" ] || [ "$INPUT" = "__auto__" ]; then
            if [ "$SKIP_ALL" = "true" ]; then
              SELECTION_MODE="auto-skip"
            elif [ "$(echo "$TARGETS_JSON" | jq 'index("all") != null')" = "true" ]; then
              SELECTION_MODE="auto-all"
            else
              SELECTION_MODE="auto-subset"
            fi
          elif [ "$(echo "$TARGETS_JSON" | jq 'length')" -eq 0 ] || [ "$(echo "$TARGETS_JSON" | jq 'index("all") != null')" = "true" ]; then
            SELECTION_MODE="all"
          elif [ "$SKIP_ALL" = "true" ]; then
            SELECTION_MODE="skip"
          fi

          AXVISOR_COUNT=$(echo "$AXVISOR_MATRIX" | jq 'length')
          STARRY_COUNT=$(echo "$STARRY_MATRIX" | jq 'length')

          echo "axvisor_matrix=$AXVISOR_MATRIX" >> "$GITHUB_OUTPUT"
          echo "starry_matrix=$STARRY_MATRIX" >> "$GITHUB_OUTPUT"
          echo "skip_all=$SKIP_ALL" >> "$GITHUB_OUTPUT"
          echo "selection_mode=$SELECTION_MODE" >> "$GITHUB_OUTPUT"
          echo "requested_targets=$INPUT" >> "$GITHUB_OUTPUT"
          echo "axvisor_count=$AXVISOR_COUNT" >> "$GITHUB_OUTPUT"
          echo "starry_count=$STARRY_COUNT" >> "$GITHUB_OUTPUT"

          echo "Input test_targets: $INPUT"
          echo "Auto detect reason: $AUTO_REASON"
          echo "Base ref: $BASE_REF"
          echo "Targets json: $TARGETS_JSON"
          echo "AXVISOR_MATRIX: $AXVISOR_MATRIX"
          echo "STARRY_MATRIX: $STARRY_MATRIX"

      - name: Write detect summary
        run: |
          {
            echo "## Dependency-aware Selection"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| requested_targets | \`${{ steps.matrix.outputs.requested_targets }}\` |"
            echo "| selection_mode | \`${{ steps.matrix.outputs.selection_mode }}\` |"
            echo "| skip_all | \`${{ steps.matrix.outputs.skip_all }}\` |"
            echo "| axvisor_count | \`${{ steps.matrix.outputs.axvisor_count }}\` |"
            echo "| starry_count | \`${{ steps.matrix.outputs.starry_count }}\` |"
            echo ""
            echo "### Axvisor Matrix"
            echo "\`\`\`json"
            echo '${{ steps.matrix.outputs.axvisor_matrix }}' | jq .
            echo "\`\`\`"
            echo ""
            echo "### Starry Matrix"
            echo "\`\`\`json"
            echo '${{ steps.matrix.outputs.starry_matrix }}' | jq .
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ========== Axvisor Tests ==========
  axvisor:
    needs: detect
    if: needs.detect.outputs.skip_all != 'true' && needs.detect.outputs.axvisor_matrix != '[]'
    name: "Axvisor: ${{ matrix.type }} - ${{ matrix.vmconfigs_name }}"
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.axvisor_matrix) }}
    # Use hosted runner to avoid fork users being blocked by self-hosted labels.
    runs-on: ubuntu-latest

    steps:
      - name: Clean up workspace
        run: |
          [ -d .git ] && git submodule deinit -f . || true
          [ -d .git/modules ] && rm -rf .git/modules || true
          [ -d .git ] && git clean -ffdx || true

      - name: Harden git network settings
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 104857600

      - name: Checkout component
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          path: component

      - name: Checkout axvisor
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          repository: arceos-hypervisor/axvisor
          ref: master
          path: axvisor
          submodules: recursive

      - name: Install Rust toolchain for axvisor build
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rust-src, llvm-tools
          targets: x86_64-unknown-none, aarch64-unknown-none-softfloat

      - name: Ensure rust-objcopy is available
        run: |
          if command -v rust-objcopy >/dev/null 2>&1; then
            rust-objcopy --version
          else
            cargo install cargo-binutils
            rust-objcopy --version
          fi

      - name: Setup QEMU for axvisor tests
        if: matrix.type == 'qemu'
        uses: arceos-org/setup-qemu@v1
        with:
          version: 10.1.0
          arch_list: ${{ matrix.arch }}

      - name: Get component crate name
        id: component
        working-directory: component
        run: |
          if [ -n "${{ inputs.crate_name }}" ]; then
            CRATE_NAME="${{ inputs.crate_name }}"
          else
            CRATE_NAME=$(cargo tree 2>/dev/null | head -1 | cut -d' ' -f1 || basename "$(pwd)")
          fi
          echo "crate_name=$CRATE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve component patch path
        id: component_path
        run: |
          CRATE_NAME="${{ steps.component.outputs.crate_name }}"
          PATCH_PATH="$(pwd)/component"

          if [ -f component/Cargo.toml ]; then
            MANIFEST_PATH=$(cargo metadata --manifest-path component/Cargo.toml --format-version 1 --no-deps \
              | jq -r --arg name "$CRATE_NAME" '.packages[] | select(.name == $name) | .manifest_path' \
              | sed -n '1p')
            if [ -n "$MANIFEST_PATH" ] && [ "$MANIFEST_PATH" != "null" ]; then
              PATCH_PATH="$(dirname "$MANIFEST_PATH")"
            fi
          fi

          echo "patch_path=$PATCH_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved patch path: $PATCH_PATH"

      - name: Apply patch to Cargo.toml
        working-directory: axvisor
        run: |
          CRATE_NAME="${{ steps.component.outputs.crate_name }}"
          PATCH_PATH="${{ steps.component_path.outputs.patch_path }}"
          PATCH_LINE="$CRATE_NAME = { path = \"$PATCH_PATH\" }"
          if grep -q '^\[patch.crates-io\]' Cargo.toml; then
            sed -i "/^\[patch.crates-io\]/a $PATCH_LINE" Cargo.toml
          else
            echo "" >> Cargo.toml
            echo "[patch.crates-io]" >> Cargo.toml
            echo "$PATCH_LINE" >> Cargo.toml
          fi
          echo "Applied patch:"
          tail -10 Cargo.toml

      - name: Install host dependencies for ostool
        run: |
          set -e
          if command -v pkg-config >/dev/null 2>&1 && pkg-config --exists libudev; then
            echo "libudev is already available"
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pkg-config libudev-dev
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y pkgconf-pkg-config systemd-devel
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y pkgconfig systemd-devel
          elif command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache pkgconf eudev-dev
          else
            echo "No supported package manager found to install libudev development headers."
            exit 1
          fi

          pkg-config --exists libudev

      - name: Install ostool
        run: |
          if command -v ostool >/dev/null 2>&1; then
            ostool --version
          else
            cargo +stable install ostool --version ^0.8
          fi

      - name: Download images and patch vm configs (QEMU only)
        if: matrix.type == 'qemu'
        working-directory: axvisor
        run: |
          IMAGE_DIR="/tmp/.axvisor-images"
          IFS=',' read -ra CONFIGS <<< "${{ matrix.vmconfigs }}"
          IFS=',' read -ra IMAGES <<< "${{ matrix.vmimage_name }}"
          for i in "${!CONFIGS[@]}"; do
            img="${IMAGES[$i]}"
            img=$(echo "$img" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            config="${CONFIGS[$i]}"
            config=$(echo "$config" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            cargo xtask image download "$img"
            img_name="qemu-${{ matrix.arch }}"
            image_location=$(sed -n 's/^image_location[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' "$config")

            case "$image_location" in
            "fs")
              echo "Filesystem storage mode - no config update needed"
              ;;
            "memory")
              sed -i 's|^kernel_path[[:space:]]*=.*|kernel_path = "'"${IMAGE_DIR}"'/'"$img"'/'"$img_name"'"|' "$config"
              echo "Memory storage mode - updating kernel_path"
              ;;
            *)
              echo "Unknown image_location: $image_location"
              exit 1
              ;;
            esac

            ROOTFS_IMG_PATH="${IMAGE_DIR}/$img/rootfs.img"
            if [ -f "${ROOTFS_IMG_PATH}" ]; then
              sed -i 's|file=${workspaceFolder}/tmp/rootfs.img|file='"${ROOTFS_IMG_PATH}"'|' ".github/workflows/qemu-${{ matrix.arch }}.toml"
            else
              sed -i '/-device/,/virtio-blk-device,drive=disk0/d' ".github/workflows/qemu-${{ matrix.arch }}.toml"
              sed -i '/-drive/,/id=disk0,if=none,format=raw,file=${workspaceFolder}\/tmp\/rootfs.img/d' ".github/workflows/qemu-${{ matrix.arch }}.toml"
              sed -i 's/root=\/dev\/vda rw //' ".github/workflows/qemu-${{ matrix.arch }}.toml"
            fi
          done

      - name: Run QEMU tests
        if: matrix.type == 'qemu'
        working-directory: axvisor
        run: |
          export RUST_LOG=debug
          cargo xtask qemu \
            --build-config configs/board/qemu-${{ matrix.arch }}.toml \
            --qemu-config .github/workflows/qemu-${{ matrix.arch }}.toml \
            --vmconfigs ${{ matrix.vmconfigs }}

      - name: Run Board tests
        if: matrix.type == 'board'
        working-directory: axvisor
        run: |
          export RUST_LOG=debug
          cargo xtask uboot \
            --build-config configs/board/${{ matrix.board }}.toml \
            --uboot-config .github/workflows/uboot.toml \
            --vmconfigs ${{ matrix.vmconfigs }} \
            --bin-dir /home/runner/tftp

  # ========== Starry Tests ==========
  starry:
    needs: detect
    if: needs.detect.outputs.skip_all != 'true' && needs.detect.outputs.starry_matrix != '[]'
    name: "Starry: ${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.starry_matrix) }}
    runs-on: ubuntu-latest

    steps:
      - name: Harden git network settings
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 104857600

      - name: Checkout component
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          path: component

      - name: Checkout StarryOS
        uses: actions/checkout@v4
        timeout-minutes: 10
        with:
          repository: Starry-OS/StarryOS
          ref: main
          path: starry
          submodules: recursive

      - name: Get component crate name
        id: component
        working-directory: component
        run: |
          if [ -n "${{ inputs.crate_name }}" ]; then
            CRATE_NAME="${{ inputs.crate_name }}"
          else
            CRATE_NAME=$(cargo tree 2>/dev/null | head -1 | cut -d' ' -f1 || basename "$(pwd)")
          fi
          echo "crate_name=$CRATE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve component patch path
        id: component_path
        run: |
          CRATE_NAME="${{ steps.component.outputs.crate_name }}"
          PATCH_PATH="$(pwd)/component"

          if [ -f component/Cargo.toml ]; then
            MANIFEST_PATH=$(cargo metadata --manifest-path component/Cargo.toml --format-version 1 --no-deps \
              | jq -r --arg name "$CRATE_NAME" '.packages[] | select(.name == $name) | .manifest_path' \
              | sed -n '1p')
            if [ -n "$MANIFEST_PATH" ] && [ "$MANIFEST_PATH" != "null" ]; then
              PATCH_PATH="$(dirname "$MANIFEST_PATH")"
            fi
          fi

          echo "patch_path=$PATCH_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved patch path: $PATCH_PATH"

      - name: Apply patch to Cargo.toml
        working-directory: starry
        run: |
          CRATE_NAME="${{ steps.component.outputs.crate_name }}"
          PATCH_PATH="${{ steps.component_path.outputs.patch_path }}"
          PATCH_LINE="$CRATE_NAME = { path = \"$PATCH_PATH\" }"
          if grep -q '^\[patch.crates-io\]' Cargo.toml; then
            sed -i "/^\[patch.crates-io\]/a $PATCH_LINE" Cargo.toml
          else
            echo "" >> Cargo.toml
            echo "[patch.crates-io]" >> Cargo.toml
            echo "$PATCH_LINE" >> Cargo.toml
          fi
          echo "Applied patch:"
          tail -10 Cargo.toml

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-targets: false

      - uses: arceos-org/setup-musl@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build
        working-directory: starry
        run: make ARCH=${{ matrix.arch }} build

      - name: Setup QEMU
        uses: arceos-org/setup-qemu@v1
        with:
          version: 10.1.0
          arch_list: ${{ matrix.arch }}

      - name: Prepare rootfs
        working-directory: starry
        run: make ARCH=${{ matrix.arch }} img

      - name: Test
        working-directory: starry
        run: scripts/ci-test.py ${{ matrix.arch }}
