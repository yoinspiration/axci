# Sync Workflow - Synchronize changes between monorepo and component repos using git subtree
#
# This workflow uses git subtree for bidirectional sync, preserving full commit history.
#
# Sync Directions:
# 1. Monorepo -> Component repos: Push changes from tgoskits to component repos
#    Uses: git subtree push --prefix=<dir> <repo_url> <branch>
# 2. Component -> Monorepo: Pull changes from component repos to tgoskits
#    Uses: git subtree pull --prefix=<dir> <repo_url> <branch>
#
# Inputs:
#   sync_direction: Direction of sync - 'push-to-components' or 'pull-from-components' 
#                   (default: 'push-to-components')
#   component_name: Specific component to sync (optional, syncs all if not specified)
#   component_repo: Component repository URL (auto-detected from Cargo.toml if empty)
#   component_branch: Component branch (default: main or master)
#   dry_run: Only show what would be synced without making changes (default: false)

name: Sync

on:
  workflow_call:
    inputs:
      sync_direction:
        description: 'Direction: push-to-components or pull-from-components'
        required: false
        default: 'push-to-components'
        type: string
      component_name:
        description: 'Component name to sync (empty = detect all changed components)'
        required: false
        default: ''
        type: string
      component_repo:
        description: 'Component repository URL (auto-detected if empty)'
        required: false
        default: ''
        type: string
      component_branch:
        description: 'Component branch (default: main)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run mode - only show what would be synced'
        required: false
        default: false
        type: boolean
    secrets:
      SYNC_TOKEN:
        description: 'GitHub token with repo access'
        required: true

jobs:
  # Detect changed components for push-to-components direction
  detect-changes:
    if: inputs.sync_direction == 'push-to-components' && inputs.component_name == ''
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.detect.outputs.components }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Detect changed components
        id: detect
        run: |
          # Get list of changed files in the last commit
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git ls-files)
            else
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
            fi
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Find unique component directories
          COMPONENTS="[]"
          for FILE in $CHANGED_FILES; do
            COMPONENT=$(echo "$FILE" | cut -d'/' -f1)
            
            # Skip non-component directories
            if [ -f "$COMPONENT/Cargo.toml" ] && \
               [ "$COMPONENT" != ".github" ] && \
               [ "$COMPONENT" != "scripts" ] && \
               [ "$COMPONENT" != "axci" ]; then
              # Add to array if not already present
              if ! echo "$COMPONENTS" | jq -e ". | index(\"$COMPONENT\")" > /dev/null 2>&1; then
                # Check if repository URL exists in Cargo.toml
                if grep -q 'repository\s*=' "$COMPONENT/Cargo.toml"; then
                  COMPONENTS=$(echo "$COMPONENTS" | jq ". + [\"$COMPONENT\"]")
                fi
              fi
            fi
          done
          
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT
          if [ "$COMPONENTS" = "[]" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi
          
          echo "Detected components: $COMPONENTS"

  # Push changes from monorepo to component repos using git subtree
  push-to-components:
    if: inputs.sync_direction == 'push-to-components'
    name: Push to Components
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ 
          inputs.component_name != '' && 
          fromJson(format('["{0}"]', inputs.component_name)) || 
          fromJson(needs.detect-changes.outputs.components) 
        }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Get component repository info
        id: info
        run: |
          COMPONENT="${{ matrix.component }}"
          
          # Get repository URL from Cargo.toml
          REPO_URL=$(grep -P 'repository\s*=' "$COMPONENT/Cargo.toml" | \
                     sed 's/.*repository\s*=\s*"\(.*\)".*/\1/' | head -1)
          
          if [ -z "$REPO_URL" ]; then
            echo "::error::No repository URL found in $COMPONENT/Cargo.toml"
            exit 1
          fi
          
          # Use provided branch or detect default
          BRANCH="${{ inputs.component_branch }}"
          if [ -z "$BRANCH" ]; then
            # Try common branch names
            if git ls-remote --heads "$REPO_URL" | grep -q 'refs/heads/main$'; then
              BRANCH="main"
            elif git ls-remote --heads "$REPO_URL" | grep -q 'refs/heads/master$'; then
              BRANCH="master"
            else
              BRANCH="main"  # Default fallback
            fi
          fi
          
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT

      - name: Push to component repo using git subtree
        run: |
          COMPONENT="${{ steps.info.outputs.component }}"
          REPO_URL="${{ steps.info.outputs.repo_url }}"
          BRANCH="${{ steps.info.outputs.branch }}"
          
          echo "Pushing $COMPONENT to $REPO_URL (branch: $BRANCH)"
          
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: Would execute:"
            echo "  git subtree push --prefix=$COMPONENT $REPO_URL $BRANCH"
            exit 0
          fi
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use git subtree push to push changes back to component repo
          # This preserves all commit history
          git subtree push --prefix="$COMPONENT" "$REPO_URL" "$BRANCH"
          
          echo "✅ Successfully pushed $COMPONENT to $REPO_URL"

  # Pull changes from component repos to monorepo using git subtree
  pull-from-components:
    if: inputs.sync_direction == 'pull-from-components'
    name: Pull from Component
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Get component repository info
        id: info
        run: |
          COMPONENT="${{ inputs.component_name }}"
          
          if [ -z "$COMPONENT" ]; then
            echo "::error::component_name is required for pull-from-components"
            exit 1
          fi
          
          # Get repository URL
          REPO_URL="${{ inputs.component_repo }}"
          if [ -z "$REPO_URL" ]; then
            REPO_URL=$(grep -P 'repository\s*=' "$COMPONENT/Cargo.toml" | \
                       sed 's/.*repository\s*=\s*"\(.*\)".*/\1/' | head -1)
          fi
          
          if [ -z "$REPO_URL" ]; then
            echo "::error::No repository URL found"
            exit 1
          fi
          
          # Get branch
          BRANCH="${{ inputs.component_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi
          
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT

      - name: Pull from component repo using git subtree
        run: |
          COMPONENT="${{ steps.info.outputs.component }}"
          REPO_URL="${{ steps.info.outputs.repo_url }}"
          BRANCH="${{ steps.info.outputs.branch }}"
          
          echo "Pulling updates from $REPO_URL (branch: $BRANCH) to $COMPONENT"
          
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: Would execute:"
            echo "  git subtree pull --prefix=$COMPONENT $REPO_URL $BRANCH"
            exit 0
          fi
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use git subtree pull to get updates from component repo
          # This preserves all commit history and handles merges
          git subtree pull --prefix="$COMPONENT" "$REPO_URL" "$BRANCH" --message "sync: Update $COMPONENT from upstream"
          
          # Push the merged changes to monorepo
          git push origin ${{ github.ref_name }}
          
          echo "✅ Successfully pulled updates to $COMPONENT"

  # No changes notification
  no-changes:
    if: inputs.sync_direction == 'push-to-components' && needs.detect-changes.outputs.has-changes == 'false'
    name: No Changes to Sync
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: No changes
        run: |
          echo "No component changes detected."
          echo "Only changes in component directories will trigger synchronization."
