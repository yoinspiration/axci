# Quality Check Workflow
# Performs code quality checks: format, clippy, build, doc
#
# Default config: merged targets = [aarch64-unknown-none-softfloat]
#                 rust_components = [rust-src, clippy, rustfmt, llvm-tools]
# Inputs:
#   all_features: Use --all-features flag (default: true)
#   targets: Build targets (JSON array, optional)
#   unit_test_targets: Unit test targets (JSON array, optional)
#   rust_components: Rust components to install (optional)
#   skip_build: Skip build step (default: false)

name: Check

on:
  workflow_call:
    inputs:
      all_features:
        description: 'Use --all-features flag'
        required: false
        default: true
        type: boolean
      targets:
        description: 'Build targets (JSON array)'
        required: false
        default: '[]'
        type: string
      unit_test_targets:
        description: 'Unit test targets (JSON array)'
        required: false
        default: '[]'
        type: string
      rust_components:
        description: 'Rust components (comma-separated)'
        required: false
        default: 'rust-src, clippy, rustfmt, llvm-tools'
        type: string
      skip_build:
        description: 'Skip build step'
        required: false
        default: false
        type: boolean

jobs:
  prepare-targets:
    name: Prepare Targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.merge.outputs.targets }}
    steps:
      - name: Merge targets
        id: merge
        run: |
          TARGETS='${{ inputs.targets }}'
          UNIT_TEST_TARGETS='${{ inputs.unit_test_targets }}'
          MERGED=$(jq -cn \
            --argjson targets "$TARGETS" \
            --argjson unit_test_targets "$UNIT_TEST_TARGETS" \
            '(([($targets // []), ($unit_test_targets // [])] | add) | unique) as $merged
            | if ($merged | length) > 0 then $merged else ["aarch64-unknown-none-softfloat"] end')
          echo "targets=$MERGED" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: prepare-targets
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare-targets.outputs.targets) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: ${{ inputs.rust_components }}
          targets: ${{ matrix.target }}

      - name: Check rust version
        run: rustc --version --verbose

      - name: Check code format
        run: cargo fmt --all -- --check

      - name: Build
        if: ${{ inputs.skip_build != true }}
        run: |
          if [ "${{ inputs.all_features }}" = "true" ]; then
            cargo build --target ${{ matrix.target }} --all-features
          else
            cargo build --target ${{ matrix.target }}
          fi

      - name: Run clippy
        run: |
          if [ "${{ inputs.all_features }}" = "true" ]; then
            cargo clippy --target ${{ matrix.target }} --all-features -- -D warnings
          else
            cargo clippy --target ${{ matrix.target }} -- -D warnings
          fi

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links -D missing-docs
        run: |
          if [ "${{ inputs.all_features }}" = "true" ]; then
            cargo doc --no-deps --target ${{ matrix.target }} --all-features
          else
            cargo doc --no-deps --target ${{ matrix.target }}
          fi
