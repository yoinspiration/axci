# Quality Check Workflow
# Performs code quality checks: format, clippy, build, doc
#
# Default config: merged targets = [aarch64-unknown-none-softfloat]
#                 rust_components = [rust-src, clippy, rustfmt, llvm-tools]
# Inputs:
#   all_features: Use --all-features flag (default: true)
#   targets: Build targets (JSON array, optional)
#   unit_test_targets: Unit test targets (JSON array, optional)
#   rust_components: Rust components to install (optional)
#   skip_build: Skip build step (default: false)

name: Check

on:
  workflow_call:
    inputs:
      all_features:
        description: 'Use --all-features flag'
        required: false
        default: true
        type: boolean
      targets:
        description: 'Build targets (JSON array)'
        required: false
        default: '[]'
        type: string
      rust_components:
        description: 'Rust components (comma-separated)'
        required: false
        default: 'rust-src, clippy, rustfmt, llvm-tools'
        type: string
      skip_build:
        description: 'Skip build step'
        required: false
        default: false
        type: boolean

jobs:
  prepare-targets:
    name: Prepare Targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Clone test framework
        run: |
          git clone --depth 1 https://github.com/arceos-hypervisor/axci.git axci
          chmod +x axci/check.sh

      - name: Resolve targets
        id: resolve
        run: |
          TARGETS_ARG=""
          TARGETS_JSON='${{ inputs.targets }}'
          if [ "$TARGETS_JSON" != "[]" ]; then
            TARGETS_ARG="--targets $(echo "$TARGETS_JSON" | jq -r 'join(",")')"
          fi
          TARGETS=$(bash ./axci/check.sh --component-dir . $TARGETS_ARG --list-targets-json)
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: prepare-targets
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare-targets.outputs.targets) }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Clone test framework
        run: |
          git clone --depth 1 --branch ndev https://github.com/arceos-hypervisor/axci.git axci
          chmod +x axci/check.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: ${{ inputs.rust_components }}
          targets: ${{ matrix.target }}

      - name: Check rust version
        run: rustc --version --verbose

      - name: Run fmt
        run: |
          FLAGS="--component-dir . --targets ${{ matrix.target }}"
          bash ./axci/check.sh $FLAGS --only fmt

      - name: Run build
        if: ${{ inputs.skip_build != true }}
        run: |
          FLAGS="--component-dir . --targets ${{ matrix.target }}"
          if [ "${{ inputs.all_features }}" != "true" ]; then
            FLAGS="$FLAGS --no-all-features"
          fi
          bash ./axci/check.sh $FLAGS --only build

      - name: Run clippy
        run: |
          FLAGS="--component-dir . --targets ${{ matrix.target }}"
          if [ "${{ inputs.all_features }}" != "true" ]; then
            FLAGS="$FLAGS --no-all-features"
          fi
          bash ./axci/check.sh $FLAGS --only clippy

      - name: Run doc
        run: |
          FLAGS="--component-dir . --targets ${{ matrix.target }}"
          if [ "${{ inputs.all_features }}" != "true" ]; then
            FLAGS="$FLAGS --no-all-features"
          fi
          bash ./axci/check.sh $FLAGS --only doc
